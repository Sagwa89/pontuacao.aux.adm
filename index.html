<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Auxiliar Administrativo Três Barras </title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --muted: #666;
    --accent: #1d6e4f;
    --accent-light: #e8f5ef;
    --accent-text: #0f4a35;
    --danger: #c0392b;
    --danger-light: #fdf0ef;
    --gold: #b8860b;
    --silver: #607d8b;
    --bronze: #8d5524;
  }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 4rem;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 1.5rem 1rem 1rem;
    text-align: center;
  }
  header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.02em; }
  header p { font-size: 0.85rem; opacity: 0.8; margin-top: 0.25rem; }

  .wrap { max-width: 680px; margin: 0 auto; padding: 0 1rem; }

  /* RANKING */
  .ranking-section { margin: 1.5rem 0; }
  .section-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  .ranking-list { display: flex; flex-direction: column; gap: 0.5rem; }

  .rank-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    transition: box-shadow 0.15s;
  }
  .rank-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  
  /* DESTAQUE DO PRÓPRIO USUÁRIO */
  .rank-card.mine { 
    border-color: var(--accent); 
    border-width: 2px; 
    background: var(--accent-light); 
  }

  .rank-pos {
    font-size: 0.85rem;
    font-weight: 700;
    min-width: 2rem;
    text-align: center;
    color: var(--muted);
  }
  .rank-pos.p1 { color: var(--gold); font-size: 1.1rem; }
  .rank-pos.p2 { color: var(--silver); font-size: 1rem; }
  .rank-pos.p3 { color: var(--bronze); font-size: 0.95rem; }

  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-weight: 500; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-insc { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }

  .rank-score {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 3rem;
    text-align: right;
  }

  .rank-actions { display: flex; gap: 0.4rem; }
  .btn-icon {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: 6px;
    width: 30px; height: 30px;
    cursor: pointer;
    font-size: 0.8rem;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s, color 0.1s;
  }
  .btn-icon:hover { background: var(--bg); color: var(--text); }
  .btn-icon.danger:hover { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }

  .empty {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--muted);
    font-size: 0.95rem;
    background: var(--surface);
    border-radius: 10px;
    border: 0.5px dashed var(--border);
    line-height: 1.5;
  }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FORM */
  .form-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin: 1.5rem 0;
  }
  .form-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }

  .fields { display: flex; flex-direction: column; gap: 0.75rem; }

  label { display: flex; flex-direction: column; gap: 0.3rem; font-size: 0.82rem; font-weight: 500; color: var(--muted); }
  input[type=text], input[type=number], input[type=password] {
    border: 0.5px solid rgba(0,0,0,0.18);
    border-radius: 8px;
    padding: 0.55rem 0.75rem;
    font-size: 0.95rem;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    transition: border-color 0.15s;
    width: 100%;
  }
  input:focus { outline: none; border-color: var(--accent); background: white; }

  .row { display: flex; gap: 0.75rem; }
  .row label { flex: 1; }

  .hint { font-size: 0.75rem; color: var(--muted); margin-top: -0.25rem; }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.65rem 1rem;
    font-size: 0.95rem;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    margin-top: 0.25rem;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg {
    font-size: 0.83rem;
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    margin-top: 0.5rem;
    display: none;
  }
  .msg.ok { background: var(--accent-light); color: var(--accent-text); display: block; }
  .msg.err { background: var(--danger-light); color: var(--danger); display: block; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 1rem;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--surface);
    border-radius: 12px;
    padding: 1.5rem;
    width: 100%;
    max-width: 380px;
    border: 0.5px solid var(--border);
  }
  .modal h3 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
  .modal .fields { gap: 0.6rem; }
  .modal-btns { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .btn-secondary {
    flex: 1;
    background: none;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem;
    font-size: 0.9rem;
    font-family: inherit;
    cursor: pointer;
    color: var(--text);
  }
  .btn-secondary:hover { background: var(--bg); }
  .modal .btn-primary { margin-top: 0; flex: 1.5; width: auto; }
</style>
</head>
<body>

<header>
  <h1>🏆 Ranking de Candidatos</h1>
  <p>Insira a sua pontuação para libertar a classificação</p>
</header>

<div class="wrap">

  <div class="ranking-section">
    <div class="section-title">Classificação geral</div>
    <div class="ranking-list" id="rankingList">
      </div>
  </div>

  <div class="form-card">
    <h2>Adicionar a minha pontuação</h2>
    <div class="fields">
      <label>
        Nome completo
        <input type="text" id="inNome" placeholder="Ex: Maria Silva" maxlength="80">
      </label>
      <div class="row">
        <label>
          Número de inscrição
          <input type="text" id="inInsc" placeholder="Ex: 000123" maxlength="20">
        </label>
        <label>
          Pontuação
          <input type="number" id="inPontos" placeholder="Ex: 82.5" step="0.01" min="0" max="100">
        </label>
      </div>
      <label>
        PIN (para editar depois)
        <input type="password" id="inPin" placeholder="Crie um PIN numérico" maxlength="10">
      </label>
      <p class="hint">⚠️ Guarde o seu PIN — precisará dele para editar ou remover o seu dado.</p>
      <button class="btn-primary" id="btnAdicionar" onclick="adicionar()">Registrar e Ver Ranking</button>
      <div class="msg" id="msgForm"></div>
    </div>
  </div>

</div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitulo">Editar entrada</h3>
    <div class="fields">
      <label>
        Nome completo
        <input type="text" id="mNome" maxlength="80">
      </label>
      <div class="row">
        <label>
          Inscrição
          <input type="text" id="mInsc" maxlength="20">
        </label>
        <label>
          Pontuação
          <input type="number" id="mPontos" step="0.01" min="0" max="100">
        </label>
      </div>
      <label>
        PIN atual
        <input type="password" id="mPin" placeholder="Digite o seu PIN">
      </label>
      <div class="msg" id="msgModal"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button class="btn-primary" id="btnSalvar" onclick="salvarEdicao()">Guardar</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="deleteOverlay">
  <div class="modal">
    <h3>Remover entrada</h3>
    <div class="fields">
      <p style="font-size:0.9rem;color:var(--muted)">Digite o seu PIN ou a senha de administrador.</p>
      <label>
        PIN ou senha admin
        <input type="password" id="dPin" placeholder="PIN do candidato ou senha admin">
      </label>
      <div class="msg" id="msgDelete"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="fecharDelete()">Cancelar</button>
      <button class="btn-primary" id="btnDelete" style="background:var(--danger)" onclick="confirmarDelete()">Remover</button>
    </div>
  </div>
</div>

<script>
// ── JSONBin config ──────────────────────────────────────────────
const BIN_ID     = '6a2049c8f5f4af5e29b32758';
// MASTER_KEY usada para TUDO (Lê e Escreve sem erro 401)
const MASTER_KEY = '$2a$10$H4cj8in117Rkj0LEcvosqujmvU3bEguyTbq7QhO6oK6xDC33EpPEK';
const BASE_URL   = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

// ── helpers ─────────────────────────────────────────────────────
function hashPin(pin) {
  let h = 0;
  for (let i = 0; i < pin.length; i++) h = (Math.imul(31, h) + pin.charCodeAt(i)) | 0;
  return String(h);
}

const ADMIN = hashPin('VMNWDLkFUQ@iNlppMt');
let editId = null;
let deleteId = null;

// ── JSONBin read/write ───────────────────────────────────────────
async function lerDados() {
  const res = await fetch(BASE_URL + '/latest', {
    headers: { 'X-Master-Key': MASTER_KEY } // <- CORREÇÃO DO ERRO 401 AQUI
  });
  
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(`Erro ${res.status} na leitura: ${err.message || 'Verifique as chaves'}`);
  }
  
  const json = await res.json();
  const dados = json.record;
  
  if (!dados) return [];
  if (Array.isArray(dados)) return dados;
  if (dados.candidatos && Array.isArray(dados.candidatos)) return dados.candidatos;
  
  return [];
}

async function salvarDados(dadosArray) {
  const payload = { candidatos: dadosArray };

  const res = await fetch(BASE_URL, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': MASTER_KEY,
      'X-Bin-Versioning': 'false' // <- CORREÇÃO PARA NÃO BLOQUEAR A CONTA GRATUITA
    },
    body: JSON.stringify(payload)
  });
  
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(`Erro ${res.status} ao guardar: ${err.message || 'Sem permissão'}`);
  }
  return res.json();
}

// ── render ───────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderizar(dados) {
  const lista = document.getElementById('rankingList');
  if (!dados || !dados.length) {
    lista.innerHTML = '<div class="empty">Nenhum candidato registado ainda. Seja o primeiro!</div>';
    return;
  }

  const sorted = [...dados].sort((a, b) => b.pontos - a.pontos);
  const posClass = ['p1','p2','p3'];
  const medals = ['🥇','🥈','🥉'];
  
  const minhaInscricao = localStorage.getItem('minhaInscricao');

  lista.innerHTML = sorted.map((d, i) => {
    const pos = i + 1;
    const cls = posClass[i] || '';
    const medal = medals[i] || pos;
    
    // Destaca o usuário em verde
    const cardClass = (d.insc === minhaInscricao) ? 'rank-card mine' : 'rank-card';

    return `
      <div class="${cardClass}" data-id="${d.id}">
        <div class="rank-pos ${cls}">${medal}</div>
        <div class="rank-info">
          <div class="rank-name">${esc(d.nome)}</div>
          <div class="rank-insc">Inscrição: ${esc(d.insc)}</div>
        </div>
        <div class="rank-score">${Number(d.pontos).toFixed(1)}</div>
        <div class="rank-actions">
          <button class="btn-icon" title="Editar" onclick="abrirEdicao('${d.id}')">✏️</button>
          <button class="btn-icon danger" title="Remover" onclick="abrirDelete('${d.id}')">🗑️</button>
        </div>
      </div>`;
  }).join('');
}

async function carregarERenderizar() {
  const lista = document.getElementById('rankingList');
  lista.innerHTML = '<div class="loading"><span class="spinner"></span>A carregar ranking...</div>';
  try {
    const dados = await lerDados();
    renderizar(dados);
  } catch(e) {
    lista.innerHTML = `<div class="empty" style="color:var(--danger)">${e.message}</div>`;
    console.error(e);
  }
}

// ── Controle de Bloqueio (O Cofre) ───────────────────────────────
function verificarAcesso() {
  const liberado = localStorage.getItem('rankingLiberado');
  
  if (liberado === 'true') {
    carregarERenderizar();
  } else {
    const lista = document.getElementById('rankingList');
    lista.innerHTML = `
      <div class="empty">
        <span style="font-size: 2rem; display: block; margin-bottom: 0.5rem;">🔒</span>
        <b>Ranking Oculto</b><br>
        Preencha a sua pontuação no formulário abaixo para descobrir em que posição ficou!
      </div>
    `;
  }
}

// ── adicionar ────────────────────────────────────────────────────
async function adicionar() {
  const nome   = document.getElementById('inNome').value.trim();
  const insc   = document.getElementById('inInsc').value.trim();
  const pontos = parseFloat(document.getElementById('inPontos').value);
  const pin    = document.getElementById('inPin').value.trim();
  const msg    = document.getElementById('msgForm');
  const btn    = document.getElementById('btnAdicionar');
  msg.className = 'msg';

  if (!nome || !insc || isNaN(pontos) || !pin) {
    msg.textContent = 'Preencha todos os campos.';
    msg.className = 'msg err';
    return;
  }
  if (pin.length < 4) {
    msg.textContent = 'O PIN deve ter pelo menos 4 dígitos.';
    msg.className = 'msg err';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'A guardar e libertar ranking...';

  try {
    const dados = await lerDados();

    const duplicado = dados.find(d => d.insc === insc);
    if (duplicado) {
      msg.textContent = 'Número de inscrição já registado.';
      msg.className = 'msg err';
      return;
    }

    dados.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      nome, insc, pontos,
      pin: hashPin(pin)
    });

    await salvarDados(dados);
    
    // Libera o ranking e salva quem é a pessoa
    localStorage.setItem('rankingLiberado', 'true');
    localStorage.setItem('minhaInscricao', insc);

    renderizar(dados);

    document.getElementById('inNome').value = '';
    document.getElementById('inInsc').value = '';
    document.getElementById('inPontos').value = '';
    document.getElementById('inPin').value = '';
    msg.textContent = 'Sucesso! O ranking foi libertado e você está destacado nele.';
    msg.className = 'msg ok';
    setTimeout(() => msg.className = 'msg', 5000);
  } catch(e) {
    msg.textContent = e.message;
    msg.className = 'msg err';
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Registrar e Ver Ranking';
  }
}

// ── edição ───────────────────────────────────────────────────────
let _dadosCache = null;

async function abrirEdicao(id) {
  try {
    const dados = await lerDados();
    _dadosCache = dados;
    const d = dados.find(x => x.id === id);
    if (!d) return;
    editId = id;
    document.getElementById('mNome').value = d.nome;
    document.getElementById('mInsc').value = d.insc;
    document.getElementById('mPontos').value = d.pontos;
    document.getElementById('mPin').value = '';
    document.getElementById('msgModal').className = 'msg';
    document.getElementById('modalTitulo').textContent = 'Editar: ' + d.nome;
    document.getElementById('modalOverlay').classList.remove('hidden');
  } catch(e) {
    alert('Erro: ' + e.message);
  }
}

function fecharModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  editId = null;
  _dadosCache = null;
}

async function salvarEdicao() {
  const pin  = document.getElementById('mPin').value.trim();
  const msg  = document.getElementById('msgModal');
  const btn  = document.getElementById('btnSalvar');

  const dados = _dadosCache;
  const idx   = dados ? dados.findIndex(x => x.id === editId) : -1;
  if (idx === -1) { fecharModal(); return; }

  if (hashPin(pin) !== dados[idx].pin) {
    msg.textContent = 'PIN incorreto.';
    msg.className = 'msg err';
    return;
  }

  const nome   = document.getElementById('mNome').value.trim();
  const insc   = document.getElementById('mInsc').value.trim();
  const pontos = parseFloat(document.getElementById('mPontos').value);

  if (!nome || !insc || isNaN(pontos)) {
    msg.textContent = 'Preencha todos os campos.';
    msg.className = 'msg err';
    return;
  }

  const dup = dados.find(d => d.insc === insc && d.id !== editId);
  if (dup) {
    msg.textContent = 'A inscrição já existe noutro registo.';
    msg.className = 'msg err';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'A guardar...';

  try {
    dados[idx] = { ...dados[idx], nome, insc, pontos };
    await salvarDados(dados);
    
    if (localStorage.getItem('minhaInscricao') === dados[idx].insc) {
         localStorage.setItem('minhaInscricao', insc);
    }
    
    renderizar(dados);
    fecharModal();
  } catch(e) {
    msg.textContent = e.message;
    msg.className = 'msg err';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar';
  }
}

// ── exclusão ─────────────────────────────────────────────────────
let _dadosCacheDelete = null;

async function abrirDelete(id) {
  try {
    const dados = await lerDados();
    _dadosCacheDelete = dados;
    deleteId = id;
    document.getElementById('dPin').value = '';
    document.getElementById('msgDelete').className = 'msg';
    document.getElementById('deleteOverlay').classList.remove('hidden');
  } catch(e) {
    alert('Erro: ' + e.message);
  }
}

function fecharDelete() {
  document.getElementById('deleteOverlay').classList.add('hidden');
  deleteId = null;
  _dadosCacheDelete = null;
}

async function confirmarDelete() {
  const pin = document.getElementById('dPin').value.trim();
  const msg = document.getElementById('msgDelete');
  const btn = document.getElementById('btnDelete');

  const dados = _dadosCacheDelete;
  const idx   = dados ? dados.findIndex(x => x.id === deleteId) : -1;
  if (idx === -1) { fecharDelete(); return; }

  if (hashPin(pin) !== dados[idx].pin && hashPin(pin) !== ADMIN) {
    msg.textContent = 'PIN incorreto.';
    msg.className = 'msg err';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'A remover...';

  try {
    dados.splice(idx, 1);
    await salvarDados(dados);
    renderizar(dados);
    fecharDelete();
  } catch(e) {
    msg.textContent = e.message;
    msg.className = 'msg err';
    btn.disabled = false;
    btn.textContent = 'Remover';
  }
}

// ── fechar modal clicando fora ───────────────────────────────────
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) fecharModal(); });
document.getElementById('deleteOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) fecharDelete(); });

// ── init ─────────────────────────────────────────────────────────
verificarAcesso();
</script>
</body>
</html>
